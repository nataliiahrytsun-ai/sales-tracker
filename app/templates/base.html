<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sales Tracker{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', path='/css/app.css') }}"
    >
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-content">
        <div class="header-top-row">
          <a class="brand" href="{{ url_for('home') }}">Sales Tracker</a>
          {% if current_user is defined and current_user %}
            <form class="header-logout" method="post" action="{{ url_for('logout') }}">
              <button class="button button-secondary" type="submit">Logout</button>
            </form>
          {% endif %}
        </div>
        {% if current_user is defined and current_user %}
          <nav class="user-nav" aria-label="User navigation">
            {% if not current_user.must_change_password %}
              <a
                class="header-home-link{% if request.url.path == '/' %} header-home-link-active{% endif %}"
                href="{{ url_for('home') }}"
                {% if request.url.path == '/' %}aria-current="page"{% endif %}
              >Home</a>
            {% endif %}
            <a
              class="header-home-link{% if request.url.path == '/change-password' %} header-home-link-active{% endif %}"
              href="{{ url_for('change_password_page') }}"
              {% if request.url.path == '/change-password' %}aria-current="page"{% endif %}
            >Change password</a>
            <span class="user-name">{{ current_user.name }}</span>
          </nav>
        {% endif %}
      </div>
    </header>
    <main class="shell page-content">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
