{% extends "base.html" %}

{% block title %}Login - Sales Tracker{% endblock %}

{% block content %}
  <section class="auth-card" aria-labelledby="login-heading">
    <div class="section-heading">
      <p class="eyebrow">Welcome back</p>
      <h1 id="login-heading">Login</h1>
      <p>Sign in with your Sales Tracker account.</p>
    </div>

    {% if error %}
      <p class="alert" role="alert">{{ error }}</p>
    {% endif %}

    <form class="form-stack" method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ request.scope.get('session', {}).get('csrf_token', '') }}">
      <div class="field-group">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          value="{{ email }}"
          autocomplete="username"
          inputmode="email"
          required
        >
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        >
      </div>

      <button class="button button-primary button-full" type="submit">
        Login
      </button>
    </form>
  </section>
{% endblock %}
