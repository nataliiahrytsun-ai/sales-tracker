name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check installed dependencies
        run: python -m pip check

      - name: Compile Python sources
        run: python -m compileall app tests migrations

      - name: Check Alembic head
        run: python -m alembic heads

      - name: Run full test suite
        env:
          SALES_TRACKER_ENVIRONMENT: test
          SALES_TRACKER_DATABASE_URL: sqlite:///${{ runner.temp }}/sales_tracker-ci.db
        run: >-
          python -m pytest -p no:cacheprovider
          --basetemp="$RUNNER_TEMP/pytest"
